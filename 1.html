<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>São Miguel · June 2026</title>
<link rel="icon" type="image/svg+xml" id="fav-svg">
<link rel="apple-touch-icon" sizes="180x180" id="fav-png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Non-blocking font load: page renders immediately with system fonts, then upgrades -->
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"></noscript>
<style>
:root {
  --bg:        #f0ece4;
  --card:      #ffffff;
  --surface:   #f8f6f2;
  --surface2:  #f0ede8;
  --border:    #ddd8cf;
  --border2:   #ccc6bb;
  --text:      #1c2a18;
  --text2:     #3e5435;
  --text3:     #7a9468;
  --text4:     #a8bc98;
  --green:     #2a6b35;
  --green-lt:  #eaf4eb;
  --green-md:  #b8dbbe;
  --teal:      #0a7c8c;
  --teal-lt:   #e2f4f6;
  --amber:     #8a5a0a;
  --amber-lt:  #fef3dd;
  --red:       #b82222;
  --red-lt:    #fdecec;
  --blue:      #1a5c9e;
  --blue-lt:   #e4eefa;
  --orange:    #b84010;
  --orange-lt: #fdeee6;
  --purple:    #6430b8;
  --purple-lt: #f0eafc;
  --serif:     'Cormorant Garamond', Georgia, serif;
  --sans:      'DM Sans', system-ui, sans-serif;
  --mono:      'Space Mono', monospace;
  --r:         14px;
  --r-sm:      8px;
  --shadow:    0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.06);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  overflow-x: hidden;
}
a { color: inherit; }

/* ── HEADER ── */
#site-header {
  background: linear-gradient(160deg, #122018 0%, #1a3020 50%, #0e2418 100%);
  padding: calc(var(--st) + 22px) 20px 26px;
  position: relative;
  overflow: hidden;
}
#site-header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 90% -10%, rgba(74,200,100,0.15) 0%, transparent 60%);
  pointer-events: none;
}
.hdr-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #7dd98a;
  text-transform: uppercase;
  margin-bottom: 8px;
  opacity: 0.9;
}
.hdr-title {
  font-family: var(--serif);
  font-size: 38px;
  font-weight: 700;
  line-height: 1.05;
  color: #f0f8f0;
  letter-spacing: -0.3px;
  margin-bottom: 2px;
}
.hdr-title em { font-style: italic; color: #7dde8a; }
.hdr-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.hdr-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: rgba(240,248,240,0.75);
  font-weight: 500;
}
.hdr-badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 3px 9px;
  border-radius: 99px;
  background: rgba(125,222,138,0.2);
  color: #7dde8a;
  border: 1px solid rgba(125,222,138,0.35);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ── SECTION ── */
.section { padding: 16px 14px 0; }
.section-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-left: 2px;
}

/* ── BOOKINGS ── */
#bookings-section { padding: 14px 14px 0; }
.bk-toggle {
  background: var(--amber-lt);
  border: 1.5px solid #e8c070;
  border-radius: var(--r);
  padding: 12px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
  box-shadow: var(--shadow-sm);
  transition: background 0.15s;
}
.bk-toggle:active { background: #fde7b0; }
.bk-icon { font-size: 20px; }
.bk-label { flex: 1; }
.bk-title { font-size: 14px; font-weight: 700; color: var(--amber); }
.bk-sub { font-size: 11px; color: #b07a20; margin-top: 1px; }
.bk-chev { color: var(--amber); font-size: 13px; transition: transform 0.28s; }
.bk-chev.open { transform: rotate(180deg); }
.bk-body { display: none; border: 1.5px solid #e8c070; border-top: none; border-radius: 0 0 var(--r) var(--r); background: #fffdf5; overflow: hidden; }
.bk-body.open { display: block; }
.bk-item { padding: 12px 14px; border-bottom: 1px solid #f0e0b0; }
.bk-item:last-child { border-bottom: none; }
.bk-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 4px; }
.bk-badge {
  font-family: var(--mono);
  font-size: 8px;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  margin-top: 2px;
  white-space: nowrap;
}
.bk-badge.urgent { background: var(--red-lt); color: var(--red); border: 1px solid #f0b0b0; }
.bk-badge.important { background: var(--amber-lt); color: var(--amber); border: 1px solid #e8c080; }
.bk-badge.check { background: var(--blue-lt); color: var(--blue); border: 1px solid #b0caf0; }
.bk-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.bk-detail { font-size: 12px; color: var(--text2); line-height: 1.55; margin-bottom: 6px; }
.bk-link { font-family: var(--mono); font-size: 10px; color: var(--teal); text-decoration: none; display: inline-block; margin-right: 10px; border-bottom: 1px solid rgba(10,124,140,0.3); }

/* ── WEATHER ── */
#weather-section { padding: 14px 14px 0; }
#weather-strip { display: flex; gap: 8px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; padding-bottom: 2px; }
#weather-strip::-webkit-scrollbar { display: none; }
.wx-card {
  flex-shrink: 0;
  width: 78px;
  scroll-snap-align: start;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 6px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s;
}
.wx-card.wx-today { border-color: #2a9e45; background: #f0faf2; }
.wx-day { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 5px; }
.wx-card.wx-today .wx-day { color: var(--green); font-weight: 700; }
.wx-emoji { font-size: 24px; display: block; margin-bottom: 4px; line-height: 1; }
.wx-hi { font-size: 15px; font-weight: 700; color: var(--text); }
.wx-lo { font-size: 12px; color: var(--text3); font-weight: 400; }
.wx-rain { font-family: var(--mono); font-size: 9px; color: var(--teal); margin-top: 3px; }
.wx-loading { font-size: 12px; color: var(--text3); padding: 14px 0; font-style: italic; }
.wx-error { font-size: 12px; color: var(--text3); padding: 12px 0; line-height: 1.55; }
.wx-error a { color: var(--teal); }

/* ── DAY NAV ── */
#day-nav {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 14px 14px 0;
  scrollbar-width: none;
}
#day-nav::-webkit-scrollbar { display: none; }
.dnav-btn {
  flex-shrink: 0;
  padding: 7px 13px;
  border-radius: 99px;
  background: var(--card);
  border: 1.5px solid var(--border);
  color: var(--text2);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 0.05em;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
  transition: all 0.18s;
}
.dnav-btn.dnav-today { border-color: var(--green); background: var(--green-lt); color: var(--green); font-weight: 700; }

/* ── WEBCAM STRIP ── */
#webcam-section { padding: 14px 14px 0; }
.wc-grid { display: flex; gap: 10px; }
.wc-card {
  flex: 1;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.wc-top {
  background: #1c2a1c;
  padding: 6px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.wc-label { font-family: var(--mono); font-size: 8px; color: #7dde8a; letter-spacing: 0.12em; text-transform: uppercase; }
.wc-live { font-family: var(--mono); font-size: 8px; color: rgba(125,222,138,0.6); }
.wc-content { padding: 10px; }
.wc-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.wc-sub { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
.wc-btn {
  display: block;
  text-align: center;
  padding: 7px 10px;
  background: var(--green-lt);
  border: 1.5px solid var(--green-md);
  border-radius: var(--r-sm);
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
  text-decoration: none;
  margin-bottom: 4px;
  transition: background 0.15s;
}
.wc-btn:active { background: var(--green-md); }
.wc-note { font-size: 10px; color: var(--text4); font-style: italic; }

/* ── DAYS MAIN ── */
#days-main { padding: 14px 14px 40px; display: flex; flex-direction: column; gap: 12px; }

/* ── DAY CARD ── */
.day-card {
  background: var(--card);
  border-radius: var(--r);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.day-card.is-today { border-color: var(--green); box-shadow: 0 0 0 3px rgba(42,107,53,0.12), var(--shadow); }
.day-hdr {
  padding: 14px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  user-select: none;
  transition: background 0.15s;
}
.day-hdr:active { background: var(--surface); }
.day-num {
  width: 44px;
  height: 44px;
  border-radius: 11px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.day-num .n { font-family: var(--serif); font-size: 22px; font-weight: 700; line-height: 1; }
.day-num .d { font-family: var(--mono); font-size: 7px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; margin-top: 1px; }
.day-info { flex: 1; min-width: 0; }
.day-title { font-family: var(--serif); font-size: 19px; font-weight: 600; line-height: 1.15; color: var(--text); }
.day-sub { font-size: 11.5px; color: var(--text3); margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.today-tag {
  font-family: var(--mono);
  font-size: 8px;
  padding: 2px 7px;
  border-radius: 99px;
  background: var(--green);
  color: #fff;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.day-chev { color: var(--text4); font-size: 11px; flex-shrink: 0; transition: transform 0.28s; }
.day-card.open .day-chev { transform: rotate(180deg); }
.day-body { display: none; }
.day-card.open .day-body { display: block; }

/* Color bar at top of each day */
.day-bar { height: 4px; width: 100%; }

/* ── PERIOD ── */
.period { border-top: 1px solid var(--border); }
.period-hdr {
  padding: 9px 14px;
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.period-icon { font-size: 14px; }
.period-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; color: var(--text3); text-transform: uppercase; flex: 1; }
.period-time { font-family: var(--mono); font-size: 9px; color: var(--text4); }

/* ── ACTIVITY ── */
.act {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
}
.act:last-child { border-bottom: none; }
.act:active { background: var(--surface); }
.act-hdr { padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; }
.act-emoji { font-size: 20px; flex-shrink: 0; margin-top: 0; line-height: 1.4; }
.act-info { flex: 1; min-width: 0; }
.act-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
.act-pills { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
.pill {
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 5px;
  letter-spacing: 0.04em;
  font-weight: 700;
}
.pill-dur { background: var(--teal-lt); color: var(--teal); border: 1px solid #90d4dc; }
.pill-cost { background: var(--green-lt); color: var(--green); border: 1px solid var(--green-md); }
.pill-warn { background: var(--red-lt); color: var(--red); border: 1px solid #f0b0b0; }
.pill-info { background: var(--blue-lt); color: var(--blue); border: 1px solid #a8c8f0; }
.act-chev { color: var(--text4); font-size: 10px; margin-top: 5px; flex-shrink: 0; transition: transform 0.25s; }
.act.open .act-chev { transform: rotate(180deg); }
.act-body { display: none; padding: 4px 14px 14px 14px; background: var(--surface); }
.act.open .act-body { display: block; }
.act-desc { font-size: 13.5px; color: var(--text2); line-height: 1.65; margin-bottom: 10px; }

/* ── TIP BOXES ── */
.tipbox {
  padding: 9px 11px;
  border-radius: var(--r-sm);
  margin-bottom: 8px;
  font-size: 12.5px;
  line-height: 1.55;
}
.tipbox-lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; display: block; margin-bottom: 3px; font-weight: 700; }
.tb-tip  { background: var(--green-lt); border: 1px solid var(--green-md); color: #1e5228; }
.tb-tip .tipbox-lbl { color: var(--green); }
.tb-warn { background: var(--amber-lt); border: 1px solid #e8c070; color: #6a4010; }
.tb-warn .tipbox-lbl { color: var(--amber); }
.tb-crowd { background: var(--blue-lt); border: 1px solid #a8c8f0; color: #1a3c6e; }
.tb-crowd .tipbox-lbl { color: var(--blue); }
.tb-rain { background: var(--purple-lt); border: 1px solid #c8a8f0; color: #3c1c78; }
.tb-rain .tipbox-lbl { color: var(--purple); }

/* ── ACTIONS ── */
.action-row { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
.abtn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 13px;
  border-radius: var(--r-sm);
  font-size: 12.5px;
  font-weight: 600;
  text-decoration: none;
  border: 1.5px solid;
  min-height: 38px;
  font-family: var(--sans);
  transition: filter 0.12s;
  cursor: pointer;
}
.abtn:active { filter: brightness(0.92); }
.abtn-maps { background: var(--green-lt); color: var(--green); border-color: var(--green-md); }
.abtn-web  { background: var(--teal-lt); color: var(--teal); border-color: #90d4dc; }
.abtn-call { background: var(--amber-lt); color: var(--amber); border-color: #e8c070; }
.act-addr { font-family: var(--mono); font-size: 10px; color: var(--text4); margin: 8px 0 4px; line-height: 1.5; }

/* ── WEBCAM IN ACTIVITY ── */
.wc-activity-box {
  margin-top: 10px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border2);
  overflow: hidden;
  background: var(--card);
}
.wc-act-hdr { background: #1c2a1c; padding: 7px 10px; display: flex; justify-content: space-between; align-items: center; }
.wc-act-title { font-family: var(--mono); font-size: 9px; color: #7dde8a; letter-spacing: 0.12em; }
.wc-act-body { padding: 10px; }
.wc-act-desc { font-size: 12px; color: var(--text2); margin-bottom: 8px; line-height: 1.5; }
.wc-act-btn { display: block; text-align: center; padding: 9px; background: var(--green-lt); border: 1.5px solid var(--green-md); border-radius: var(--r-sm); font-size: 13px; font-weight: 600; color: var(--green); text-decoration: none; }
.wc-act-btn:active { background: var(--green-md); }

/* ── RESTAURANT ── */
.rest-section { border-top: 2px solid var(--border); background: var(--surface); }
.rest-section-hdr { padding: 9px 14px; display: flex; align-items: center; gap: 7px; }
.rest-section-icon { font-size: 14px; }
.rest-section-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; color: var(--orange); text-transform: uppercase; font-weight: 700; }
.rest-card { cursor: pointer; border-top: 1px solid var(--border); transition: background 0.12s; }
.rest-card:active { background: var(--orange-lt); }
.rest-hdr { padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; }
.rest-emoji { font-size: 24px; flex-shrink: 0; }
.rest-info { flex: 1; min-width: 0; }
.rest-name { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--text); line-height: 1.15; }
.rest-type { font-size: 12px; color: var(--orange); margin-top: 2px; font-style: italic; font-weight: 500; }
.rest-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.rest-tag {
  font-family: var(--mono);
  font-size: 8px;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.rt-res { background: var(--red-lt); color: var(--red); border: 1px solid #f0b0b0; }
.rt-walk { background: var(--green-lt); color: var(--green); border: 1px solid var(--green-md); }
.rt-early { background: var(--amber-lt); color: var(--amber); border: 1px solid #e8c070; }
.rest-chev { color: var(--text4); font-size: 10px; margin-top: 6px; flex-shrink: 0; transition: transform 0.25s; }
.rest-card.open .rest-chev { transform: rotate(180deg); }
.rest-body { display: none; padding: 4px 14px 14px; background: var(--surface); }
.rest-card.open .rest-body { display: block; }
.rest-desc { font-size: 13.5px; color: var(--text2); line-height: 1.65; margin-bottom: 10px; }
.must-box { background: var(--orange-lt); border: 1.5px solid #e8c8a0; border-radius: var(--r-sm); padding: 9px 11px; margin-bottom: 10px; }
.must-lbl { font-family: var(--mono); font-size: 8px; color: var(--orange); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 3px; }
.must-items { font-size: 13px; color: var(--text); line-height: 1.6; }

/* ── DAY TIP ── */
.day-tip-row { border-top: 1px solid var(--border); padding: 10px 14px; display: flex; gap: 9px; background: var(--surface2); }
.dt-icon { font-size: 16px; flex-shrink: 0; }
.dt-text { font-size: 12.5px; color: var(--text2); line-height: 1.6; }

/* ── EMERGENCY ── */
#emergency-section { padding: 14px 14px 0; margin-bottom: 20px; }
.emerg-card { background: var(--card); border: 1.5px solid #f0b0b0; border-radius: var(--r); box-shadow: var(--shadow-sm); overflow: hidden; cursor: pointer; }
.emerg-hdr { padding: 10px 14px; display: flex; gap: 8px; align-items: center; }
.emerg-title { font-family: var(--mono); font-size: 10px; color: var(--red); letter-spacing: 0.1em; text-transform: uppercase; flex: 1; font-weight: 700; }
.emerg-chev { color: var(--red); font-size: 10px; transition: transform 0.25s; }
.emerg-card.open .emerg-chev { transform: rotate(180deg); }
.emerg-body { display: none; border-top: 1px solid #f0b0b0; }
.emerg-card.open .emerg-body { display: block; }
.emerg-row { padding: 9px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #fde8e8; }
.emerg-row:last-child { border-bottom: none; }
.emerg-lbl { font-size: 13px; color: var(--text2); }
.emerg-val { font-family: var(--mono); font-size: 12px; color: var(--red); font-weight: 700; }

/* ── FOOTER ── */

const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WMO_EMOJI_MAP = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌧',55:'🌧',61:'🌧',63:'🌧',65:'🌧',80:'🌦',81:'🌧',82:'⛈',95:'⛈'};

function isToday(dateStr) {
  const t = new Date(), d = new Date(dateStr + 'T12:00:00');
  return t.getFullYear()===d.getFullYear() && t.getMonth()===d.getMonth() && t.getDate()===d.getDate();
}

const open = new Set();
function tog(id, el) {
  if (open.has(id)) { open.delete(id); el.classList.remove('open'); }
  else { open.add(id); el.classList.add('open'); }
}

function btnMaps(url) { return url ? `<a href="${url}" target="_blank" class="abtn abtn-maps">📍 Directions</a>` : ''; }
function btnWeb(url, lbl) { return url ? `<a href="${url}" target="_blank" class="abtn abtn-web">🔗 ${lbl||'Website/PDF'}</a>` : ''; }
function btnCall(url, lbl) { return url ? `<a href="${url}" class="abtn abtn-call">📞 ${lbl||'Call'}</a>` : ''; }

function tipClass(t) { return t==='warn'?'tb-warn':t==='crowd'?'tb-crowd':t==='rain'?'tb-rain':'tb-tip'; }

function renderWebcamBox(key) {
  const wc = key === 'sc' ? WEBCAMS[0] : WEBCAMS[1];
  if (!wc) return '';
  return `
    <div class="wc-activity-box">
      <div class="wc-act-hdr">
        <span class="wc-act-title">📷 LIVE CAM · ${wc.name.toUpperCase()}</span>
      </div>
      <div class="wc-act-body">
        <div class="wc-act-desc">Check current conditions before driving. Tap to open the live webcam on SpotAzores.</div>
        <a href="${wc.link}" target="_blank" class="wc-act-btn">🌐 Open ${wc.name} Webcam →</a>
      </div>
    </div>`;
}

function renderAct(a, prefix) {
  const id = prefix + '-' + a.name.slice(0,8).replace(/\s/g,'');
  const pills = [];
  if (a.dur) pills.push(`<span class="pill pill-dur">⏱ ${a.dur}</span>`);
  if (a.cost) pills.push(`<span class="pill pill-cost">💰 ${a.cost}</span>`);
  if (a.webcam) pills.push(`<span class="pill pill-info">📷 Webcam</span>`);
  if (a.faq) pills.push(`<span class="pill pill-info">📋 FAQ</span>`);
  if (a.emoji === '🍴') pills.push(`<span class="pill pill-lunch">🍴 Lunch</span>`);

  let body = '';
  if (a.desc) body += `<p class="act-desc">${a.desc}</p>`;
  if (a.tips) a.tips.forEach(t => { body += `<div class="tipbox ${tipClass(t.t)}"><span class="tipbox-lbl">${t.lbl}</span>${t.txt}</div>`; });
  if (a.webcam) body += renderWebcamBox(a.webcam);
  if (a.faq) body += renderFaq(a.faq, id);
  if (a.tideWidget) body += renderTideWidget(id);
  if (a.addr) body += `<div class="act-addr">📌 ${a.addr}</div>`;
  const acts = [btnMaps(a.maps), btnWeb(a.web), a.web2 ? `<a href="${a.web2}" target="_blank" class="abtn abtn-web">📄 Booking Info</a>` : '', btnCall(a.phone)].filter(Boolean).join('');
  if (acts) body += `<div class="action-row">${acts}</div>`;

  return `
    <div class="act" id="${id}" onclick="tog('${id}',this)">
      <div class="act-hdr">
        <span class="act-emoji">${a.emoji||'📍'}</span>
        <div class="act-info">
          <div class="act-name">${a.name}</div>
          ${pills.length ? `<div class="act-pills">${pills.join('')}</div>` : ''}
        </div>
        ${body ? `<span class="act-chev">▼</span>` : ''}
      </div>
      ${body ? `<div class="act-body">${body}</div>` : ''}
    </div>`;
}

function renderRestCard(r, idx, dayId) {
  const id = `${dayId}-rest-${idx}`;
  const tagMap = {reserve:'rt-res ⚠️ Reserve Ahead', walkIn:'rt-walk ✅ Walk-in OK', early:'rt-early ⏰ Arrive Early'};
  const [cls, ...lblParts] = (tagMap[r.res]||'rt-walk ✅').split(' ');
  const tagLbl = lblParts.join(' ');

  let body = `<p class="rest-desc">${r.desc}</p>`;
  if (r.mustOrder) body += `<div class="must-box"><span class="must-lbl">🍴 Must Order</span><div class="must-items">${r.mustOrder}</div></div>`;
  if (r.resNote) body += `<div class="tipbox tb-warn"><span class="tipbox-lbl">Reservation</span>${r.resNote}</div>`;
  if (r.addr) body += `<div class="act-addr">📌 ${r.addr}</div>`;
  const acts = [
    btnMaps(r.maps),
    r.reservationLink ? `<a href="${r.reservationLink}" target="_blank" class="abtn abtn-reserve">📅 Reserve</a>` : '',
    r.menuLink ? `<a href="${r.menuLink}" target="_blank" class="abtn abtn-menu">📋 Menu</a>` : '',
    btnWeb(r.trip,'TripAdvisor'),
    btnCall(r.phone)
  ].filter(Boolean).join('');
  if (acts) body += `<div class="action-row">${acts}</div>`;

  return `
    <div class="rest-card${idx > 0 ? ' rest-alt' : ''}" id="${id}" onclick="tog('${id}',this)">
      <div class="rest-hdr">
        <span class="rest-emoji">${r.emoji}</span>
        <div class="rest-info">
          <div class="rest-name">${r.name}</div>
          <div class="rest-type">${r.type}</div>
          <div class="rest-tags">
            <span class="rest-tag ${cls}">${tagLbl}</span>
            ${idx > 0 ? '<span class="rest-tag rt-alt">🍽️ Alternative</span>' : ''}
          </div>
        </div>
        <span class="rest-chev">▼</span>
      </div>
      <div class="rest-body">${body}</div>
    </div>`;
}

function renderRest(day) {
  const list = day.restaurants || (day.restaurant ? [day.restaurant] : []);
  if (!list.length) return '';
  return `
    <div class="rest-section">
      <div class="rest-section-hdr"><span class="rest-section-icon">🍽️</span><span class="rest-section-lbl">Tonight's Dinner — 2 Options</span></div>
      ${list.map((r, i) => renderRestCard(r, i, day.id)).join('')}
    </div>`;
}

function renderDay(day) {
  const today = isToday(day.dateStr);
  let periods = '';
  day.periods.forEach(p => {
    const acts = p.activities.map(a => renderAct(a, day.id + '-' + p.label)).join('');
    if (!acts) return;
    periods += `
      <div class="period">
        <div class="period-hdr">
          <span class="period-icon">${p.icon}</span>
          <span class="period-lbl">${p.label}</span>
          ${p.time ? `<span class="period-time">${p.time}</span>` : ''}
        </div>
        ${acts}
      </div>`;
  });

  const rainHtml = day.rain ? `
    <div class="period">
      <div class="act" id="${day.id}-rain" onclick="tog('${day.id}-rain',this)">
        <div class="act-hdr">
          <span class="act-emoji">🌧️</span>
          <div class="act-info"><div class="act-name">Rain / Fog Backup Plan</div><div class="act-pills"><span class="pill pill-info">Tap to expand</span></div></div>
          <span class="act-chev">▼</span>
        </div>
        <div class="act-body"><div class="tipbox tb-rain"><span class="tipbox-lbl">If weather turns</span>${day.rain}</div></div>
      </div>
    </div>` : '';

  return `
    <div class="day-card scroll-target${today?' is-today':''}" id="${day.id}">
      <div class="day-bar" style="background:${day.color}"></div>
      <div class="day-hdr" onclick="tog('${day.id}',this.parentElement)">
        <div class="day-num" style="background:${day.color}22;color:${day.color}">
          <span class="n">${day.number}</span>
          <span class="d">Day</span>
        </div>
        <div class="day-info">
          <div class="day-title">${day.emoji} ${day.theme}</div>
          <div class="day-sub">
            <span>${day.label}</span>
            ${day.drive ? `<span>· 🚗 ${day.drive}</span>` : ''}
            ${today ? `<span class="today-tag">TODAY</span>` : ''}
          </div>
        </div>
        <span class="day-chev">▼</span>
      </div>
      <div class="day-body">
        ${periods}
        ${renderRest(day)}
        ${rainHtml}
        ${day.tip ? `<div class="day-tip-row"><span class="dt-icon">💡</span><span class="dt-text">${day.tip}</span></div>` : ''}
      </div>
    </div>`;
}

async function loadWeather() {
  const strip = document.getElementById('weather-strip');
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=37.7412&longitude=-25.6756&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Atlantic%2FAzores&start_date=2026-06-07&end_date=2026-06-13';
    const r = await fetch(url);
    if (!r.ok) throw new Error('API error');
    const data = await r.json();
    if (!data.daily || !data.daily.time || !data.daily.time.length) throw new Error('No data');
    let html = '';
    data.daily.time.forEach((d, i) => {
      const dt = new Date(d + 'T12:00:00');
      const code = data.daily.weathercode[i];
      const emoji = WMO_EMOJI_MAP[code] || '🌤';
      const hi = Math.round(data.daily.temperature_2m_max[i]);
      const lo = Math.round(data.daily.temperature_2m_min[i]);
      const rain = data.daily.precipitation_sum[i];
      const tod = isToday(d);
      html += `<div class="wx-card${tod?' wx-today':''}">
        <div class="wx-day">${DAY_LABELS[dt.getDay()]} ${dt.getDate()}</div>
        <span class="wx-emoji">${emoji}</span>
        <div><span class="wx-hi">${hi}°</span> <span class="wx-lo">${lo}°</span></div>
        ${rain > 0.5 ? `<div class="wx-rain">💧${rain.toFixed(1)}mm</div>` : ''}
      </div>`;
    });
    strip.innerHTML = html || '<div class="wx-error">No forecast data available yet.</div>';
  } catch(e) {
    strip.innerHTML = `<div class="wx-error">Weather will load during the trip (available ~16 days out).<br>Before then: <a href="https://www.ipma.pt/en/otempo/prev.localidade.hora/#Ponta%20Delgada" target="_blank">Check IPMA Azores forecast →</a></div>`;
  }
}

function renderTideWidget(id) {
  const now = new Date();

  const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  return `
    <div class="tide-box">

        <div class="tide-note"><strong>Optimal visit window:</strong> within 1–2 hours of low tide. At low tide, hot spring water concentrates — warmest and best. At high tide, cold Atlantic water dilutes the heat significantly.</div>
        <div class="tide-hours">🕐 Ocean pool: always open · free<br>🎫 Termas Spa: Wed–Sun 10:30am–5:30pm · ticketed on-site<br>🌡 Spa pool: ~36°C · Ocean pool: varies by tide</div>

window.goToDay = function(id) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!el.classList.contains('open')) { el.classList.add('open'); open.add(id); }
  setTimeout(() => el.scrollIntoView({behavior:'smooth', block:'start'}), 60);
};

function renderEmergency() {

    return `<div class="emerg-row"><span class="emerg-lbl">${e.lbl}</span><a href="${href}" style="text-decoration:none"><span class="emerg-val">${e.val}</span></a></div>`;

}

function autoOpenToday() {
  const t = DAYS.find(d => isToday(d.dateStr));
  if (t) {
    const el = document.getElementById(t.id);
    if (el) { el.classList.add('open'); open.add(t.id); setTimeout(() => el.scrollIntoView({behavior:'smooth',block:'start'}), 400); }
  }
}
